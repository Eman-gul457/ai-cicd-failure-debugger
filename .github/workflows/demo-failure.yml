name: ReleaseGuard Demo Failure

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo-failure:
    name: Intentional Failure Scenario
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Simulate production build failure
        run: npm run build:production

      - name: Notify n8n about CI failure
        if: ${{ failure() }}
        continue-on-error: true
        env:
          N8N_CICD_WEBHOOK_URL: ${{ secrets.N8N_CICD_WEBHOOK_URL }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
        run: |
          curl --silent --show-error --fail \
            -X POST "$N8N_CICD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $N8N_WEBHOOK_SECRET" \
            --data-raw '{
              "repository": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "event_name": "${{ github.event_name }}",
              "status": "failure",
              "failure_type": "missing_npm_script",
              "failed_step": "Simulate production build failure",
              "expected_error": "Missing npm script: build:production"
            }'

      - name: Publish demo failure summary
        if: ${{ always() }}
        run: |
          {
            echo "## ReleaseGuard Demo Failure Summary"
            echo
            echo "- This workflow is intentionally designed to fail."
            echo "- The failure is used to test the AI CI/CD Failure Debugger."
            echo "- Expected failure: missing npm script \`build:production\`."
            echo "- When the failure occurs, the workflow attempts to notify n8n with the CI failure payload."
          } >> "$GITHUB_STEP_SUMMARY"
